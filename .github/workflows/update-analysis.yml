name: Update stock analysis

on:
  workflow_dispatch:
  schedule:
    # 16:30 Asia/Taipei on weekdays, after Taiwan market close data is usually available.
    - cron: "30 8 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static analysis data
        run: npm run build:analysis
        env:
          ANALYSIS_REASON: scheduled

      - name: Commit updated analysis
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/api/analysis.json data/learning-state.json
          if git diff --cached --quiet; then
            echo "No analysis changes to commit."
          else
            git commit -m "Update stock analysis"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
